# .github/workflows/deploy.yml · GitHub Pages 部署管道（v0.1 · Phase 1 §1.1.22）
#
# 触发：push 到 main · 或 Actions UI 手动触发
# 流程：checkout → pnpm install --frozen-lockfile → pnpm build → upload-pages-artifact → deploy-pages
# 资产版本：不通过 env，集中在 src/lib/images/asset-versions.ts；回滚靠改文件 + git push（DESIGN §15.1）
# Node：22（package.json engines.node 与 prebuild 检查的 Node 22 行为对齐）
# pnpm：随 pnpm/action-setup 自动从 package.json packageManager 字段或最新 stable 拉取
# prebuild hook：pnpm build 会自动跑 prebuild → tsx scripts/build-time-check.ts
#                单边 CDN 抖动 → ⚠ warn (CI log 可见，不阻塞)
#                双边 CDN 失败 → ❌ exit 1 (CI 中止 deploy)
#                CI 永远不传 SKIP_BUILD_CHECK，保证生产 build 必跑 sanity check
#
# 启用前置（手动）：GitHub Settings → Pages → Source = "GitHub Actions"（PLAN §1.1.24）

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同时只跑一次 deploy；新 push 取消上一次未完成的 deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        # pnpm build 内部 hook：先 prebuild (build-time-check.ts) 再 astro build
        # 资产版本由 src/lib/images/asset-versions.ts 集中维护；不在此处注 env
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
